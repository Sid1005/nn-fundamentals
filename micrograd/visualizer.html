<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micrograd Interactive Classifier</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #0a0a0a;
            --border-light: rgba(255, 255, 255, 0.1);
            --border-active: rgba(255, 255, 255, 0.3);
            --square-color: #00d2ff;
            --triangle-color: #ff007f;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Neue', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            z-index: 10;
        }

        h1 {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
            padding: 0 40px 40px 40px;
            flex-grow: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px;
            }
        }

        /* Minimalist Panel Styles */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* Form / Settings Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="range"] {
            width: 100%;
            background: #111111;
            border: 1px solid var(--border-light);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        select:focus {
            border-color: var(--border-active);
        }

        /* Custom Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            padding: 0;
            height: 4px;
            background: #222;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: 1px solid #000;
        }

        /* Grid selection for shapes */
        .shape-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .shape-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .shape-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .shape-btn.active[data-type="square"] {
            border-color: var(--square-color);
            color: var(--square-color);
            background: rgba(0, 210, 255, 0.05);
        }

        .shape-btn.active[data-type="triangle"] {
            border-color: var(--triangle-color);
            color: var(--triangle-color);
            background: rgba(255, 0, 127, 0.05);
        }

        /* Action Buttons */
        .btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Middle Workspace (Canvas) */
        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .canvas-container {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-overlay-text {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-muted);
            pointer-events: none;
            border: 1px solid var(--border-light);
            white-space: nowrap;
        }

        /* Stats display */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: #111111;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Micrograd Interactive Classifier</h1>
    </header>

    <div class="main-container">
        
        <!-- Left Panel: Controls -->
        <div class="panel">
            <div class="panel-title">Controls</div>
            
            <div class="control-group">
                <label>Dataset Presets</label>
                <select id="dataset-select">
                    <option value="none">Custom (Click on Canvas to Draw)</option>
                    <option value="linear">Linearly Separable</option>
                    <option value="circle">Inner Circle & Outer Ring</option>
                    <option value="exclusive">Four Quadrants (XOR)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Add Shape Type</label>
                <div class="shape-selector">
                    <button class="shape-btn active" data-type="square" id="btn-shape-square">
                        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                        Square
                    </button>
                    <button class="shape-btn" data-type="triangle" id="btn-shape-triangle">
                        <svg viewBox="0 0 24 24"><polygon points="12,3 2,21 22,21"/></svg>
                        Triangle
                    </button>
                </div>
            </div>

            <div class="control-group">
                <label>Learning Rate (<span id="lr-val">0.05</span>)</label>
                <input type="range" id="lr-slider" min="0.01" max="0.3" step="0.01" value="0.05">
            </div>

            <div class="control-group">
                <label>MLP Architecture</label>
                <select id="arch-select">
                    <option value="2-4-1">2 → 4 → 1</option>
                    <option value="2-8-1">2 → 8 → 1</option>
                    <option value="2-8-8-1">2 → 8 → 8 → 1</option>
                </select>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="epoch-counter">0</div>
                    <div class="stat-label">Epoch</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="loss-value">0.0000</div>
                    <div class="stat-label">Loss (MSE)</div>
                </div>
            </div>

            <button class="btn" id="btn-train">
                <span id="train-btn-text">Start Training</span>
            </button>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn" id="btn-step">Single Step</button>
                <button class="btn" id="btn-clear">Clear Points</button>
            </div>
            
            <button class="btn" id="btn-reset-weights">
                Reset Weights
            </button>
        </div>

        <!-- Middle: Interactive Canvas -->
        <div class="workspace">
            <div class="canvas-container">
                <canvas id="classifier-canvas" width="600" height="600"></canvas>
                <div class="canvas-overlay-text">Click anywhere to place shapes. Toggle Type using Left Panel or Spacebar.</div>
            </div>
        </div>

    </div>

    <!-- Micrograd Engine and Visualizer Script -->
    <script>
        // --- 1. JS PORT OF MICROGRAD ---
        class Value {
            constructor(data, _children = [], _op = '') {
                this.data = data;
                this.grad = 0.0;
                this._prev = new Set(_children);
                this._op = _op;
                this._backward = () => {};
            }

            add(other) {
                other = other instanceof Value ? other : new Value(other);
                const out = new Value(this.data + other.data, [this, other], '+');
                out._backward = () => {
                    this.grad += out.grad;
                    other.grad += out.grad;
                };
                return out;
            }

            mul(other) {
                other = other instanceof Value ? other : new Value(other);
                const out = new Value(this.data * other.data, [this, other], '*');
                out._backward = () => {
                    this.grad += other.data * out.grad;
                    other.grad += this.data * out.grad;
                };
                return out;
            }

            tanh() {
                const x = this.data;
                let t;
                if (x > 20) t = 1.0;
                else if (x < -20) t = -1.0;
                else t = (Math.exp(2 * x) - 1) / (Math.exp(2 * x) + 1);
                
                const out = new Value(t, [this], 'tanh');
                out._backward = () => {
                    this.grad += (1 - t * t) * out.grad;
                };
                return out;
            }

            backward() {
                const topo = [];
                const visited = new Set();
                function buildTopo(v) {
                    if (!visited.has(v)) {
                        visited.add(v);
                        for (const child of v._prev) {
                            buildTopo(child);
                        }
                        topo.push(v);
                    }
                }
                buildTopo(this);

                this.grad = 1.0;
                for (let i = topo.length - 1; i >= 0; i--) {
                    topo[i]._backward();
                }
            }
        }

        class Neuron {
            constructor(nin, nonlin = true) {
                this.w = Array.from({length: nin}, () => new Value((Math.random() * 2 - 1) * 0.8));
                this.b = new Value(0.0);
                this.nonlin = nonlin;
            }

            forward(x) {
                let act = this.b;
                for (let i = 0; i < this.w.length; i++) {
                    const xi = x[i] instanceof Value ? x[i] : new Value(x[i]);
                    act = act.add(this.w[i].mul(xi));
                }
                return this.nonlin ? act.tanh() : act;
            }

            parameters() {
                return [...this.w, this.b];
            }
        }

        class Layer {
            constructor(nin, nout, nonlin = true) {
                this.neurons = Array.from({length: nout}, () => new Neuron(nin, nonlin));
            }

            forward(x) {
                const outs = this.neurons.map(n => n.forward(x));
                return outs.length === 1 ? outs[0] : outs;
            }

            parameters() {
                return this.neurons.flatMap(n => n.parameters());
            }
        }

        class MLP {
            constructor(nin, nouts) {
                const sz = [nin, ...nouts];
                this.layers = [];
                for (let i = 0; i < nouts.length; i++) {
                    this.layers.push(new Layer(sz[i], sz[i+1], true));
                }
            }

            forward(x) {
                let val = x;
                for (const layer of this.layers) {
                    val = layer.forward(val);
                }
                return val;
            }

            parameters() {
                return this.layers.flatMap(l => l.parameters());
            }
        }

        // --- 2. APPLICATION AND STATE ---
        const canvas = document.getElementById('classifier-canvas');
        const ctx = canvas.getContext('2d');
        const datasetSelect = document.getElementById('dataset-select');
        const lrSlider = document.getElementById('lr-slider');
        const lrVal = document.getElementById('lr-val');
        const archSelect = document.getElementById('arch-select');
        const epochCounter = document.getElementById('epoch-counter');
        const lossValue = document.getElementById('loss-value');
        const btnTrain = document.getElementById('btn-train');
        const trainBtnText = document.getElementById('train-btn-text');
        const btnStep = document.getElementById('btn-step');
        const btnClear = document.getElementById('btn-clear');
        const btnResetWeights = document.getElementById('btn-reset-weights');
        
        const btnShapeSquare = document.getElementById('btn-shape-square');
        const btnShapeTriangle = document.getElementById('btn-shape-triangle');

        let points = []; // Array of {x, y, label} where label is -1 (Square) or 1 (Triangle)
        let activeShape = 'square'; // 'square' or 'triangle'
        let model = null;
        let isTraining = false;
        let epoch = 0;
        let lr = 0.05;

        // Initialize MLP model based on selected architecture
        function initModel() {
            const arch = archSelect.value.split('-').map(Number);
            const nin = arch[0];
            const nouts = arch.slice(1);
            model = new MLP(nin, nouts);
            epoch = 0;
            epochCounter.innerText = '0';
            lossValue.innerText = '0.0000';
            draw();
            drawNetworkGraph();
        }

        // --- 3. RENDERING AND DRAWING BOUNDARY ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background decision boundary heatmap if we have weights
            if (model) {
                const gridSize = 10;
                for (let x = 0; x < canvas.width; x += gridSize) {
                    for (let y = 0; y < canvas.height; y += gridSize) {
                        // Map canvas coords (0 to 500) to normalized model range (-1.2 to 1.2)
                        const mx = ((x + gridSize / 2) / canvas.width) * 2.4 - 1.2;
                        const my = (1.0 - (y + gridSize / 2) / canvas.height) * 2.4 - 1.2;
                        
                        const predVal = model.forward([mx, my]).data; // tanh output is in [-1, 1]
                        
                        // Color blending: Square (-1) is blue, Triangle (1) is pink
                        let r, g, b, alpha;
                        if (predVal > 0) {
                            // Triangle side
                            r = 255; g = 0; b = 127;
                            alpha = predVal * 0.45;
                        } else {
                            // Square side
                            r = 0; g = 210; b = 255;
                            alpha = Math.abs(predVal) * 0.45;
                        }
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                        ctx.fillRect(x, y, gridSize, gridSize);
                    }
                }
            }

            // Draw axis markers
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            // Draw data points
            points.forEach(pt => {
                ctx.save();
                ctx.shadowColor = pt.label === -1 ? 'rgba(0, 210, 255, 0.5)' : 'rgba(255, 0, 127, 0.5)';
                ctx.shadowBlur = 10;
                ctx.fillStyle = pt.label === -1 ? varCss('--square-color') : varCss('--triangle-color');
                ctx.strokeStyle = '#05060b';
                ctx.lineWidth = 2;

                if (pt.label === -1) {
                    // Square
                    const size = 12;
                    ctx.fillRect(pt.x * canvas.width - size / 2, (1.0 - pt.y) * canvas.height - size / 2, size, size);
                    ctx.strokeRect(pt.x * canvas.width - size / 2, (1.0 - pt.y) * canvas.height - size / 2, size, size);
                } else {
                    // Triangle
                    const size = 8;
                    const cx = pt.x * canvas.width;
                    const cy = (1.0 - pt.y) * canvas.height;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - size);
                    ctx.lineTo(cx - size, cy + size);
                    ctx.lineTo(cx + size, cy + size);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        function varCss(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        // --- 4. DATASET PRESETS ---
        function loadPresetDataset() {
            points = [];
            const type = datasetSelect.value;
            if (type === 'linear') {
                for (let i = 0; i < 40; i++) {
                    const x = Math.random();
                    const y = Math.random();
                    if (y > x + 0.05) {
                        points.push({ x, y, label: 1 });
                    } else if (y < x - 0.05) {
                        points.push({ x, y, label: -1 });
                    }
                }
            } else if (type === 'circle') {
                for (let i = 0; i < 60; i++) {
                    const x = Math.random();
                    const y = Math.random();
                    // distance from center (0.5, 0.5)
                    const dist = Math.sqrt((x - 0.5)**2 + (y - 0.5)**2);
                    if (dist < 0.22) {
                        points.push({ x, y, label: -1 }); // Square inside
                    } else if (dist > 0.28 && dist < 0.48) {
                        points.push({ x, y, label: 1 }); // Triangle outside
                    }
                }
            } else if (type === 'exclusive') {
                for (let i = 0; i < 60; i++) {
                    const x = Math.random();
                    const y = Math.random();
                    if (Math.abs(x - 0.5) > 0.04 && Math.abs(y - 0.5) > 0.04) {
                        const xClass = x > 0.5 ? 1 : -1;
                        const yClass = y > 0.5 ? 1 : -1;
                        // XOR condition
                        if (xClass * yClass === 1) {
                            points.push({ x, y, label: 1 });
                        } else {
                            points.push({ x, y, label: -1 });
                        }
                    }
                }
            }
            draw();
        }

        // --- 5. TRAINING LOOP STEP ---
        function trainStep() {
            if (points.length === 0) return;

            // X values mapped from [0, 1] to [-1.2, 1.2]
            const inputs = points.map(p => [p.x * 2.4 - 1.2, p.y * 2.4 - 1.2]);
            const targets = points.map(p => p.label); // -1 or 1

            // 1. Forward pass
            const ypred = inputs.map(x => model.forward(x));
            
            // 2. Compute MSE Loss
            let loss = new Value(0.0);
            for (let i = 0; i < points.length; i++) {
                const diff = ypred[i].add(targets[i] * -1); // yout - ygt
                loss = loss.add(diff.mul(diff));
            }
            const meanLoss = loss.mul(1 / points.length);

            // Add L2 regularisation to keep weights clean
            let regLoss = new Value(0.0);
            const params = model.parameters();
            params.forEach(p => {
                regLoss = regLoss.add(p.mul(p));
            });
            const totalLoss = meanLoss.add(regLoss.mul(1e-4));

            // 3. Zero grads, backward pass
            params.forEach(p => p.grad = 0.0);
            totalLoss.backward();

            // 4. Gradient descent update
            params.forEach(p => {
                p.data -= lr * p.grad;
            });

            // Update stats
            epoch++;
            epochCounter.innerText = epoch.toString();
            lossValue.innerText = meanLoss.data.toFixed(4);

            draw();
            drawNetworkGraph();
        }

        let animationFrameId = null;
        function trainingLoop() {
            if (!isTraining) return;
            trainStep();
            animationFrameId = requestAnimationFrame(trainingLoop);
        }

        // --- 6. SVG NETWORK VISUALIZATION ---
        function drawNetworkGraph() {
            // Weights visualization removed
        }

        // --- 7. EVENT LISTENERS AND INTERACTION ---
        
        // Handle adding custom shapes on Canvas click
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const canvasX = e.clientX - rect.left;
            const canvasY = e.clientY - rect.top;
            
            // Convert to relative [0, 1] scale
            const x = canvasX / canvas.width;
            const y = 1.0 - (canvasY / canvas.height);
            
            // Left click adds points, respects selection tool
            const label = activeShape === 'square' ? -1 : 1;
            points.push({ x, y, label });
            datasetSelect.value = 'none'; // Shift to custom mode
            
            draw();
            if (isTraining) {
                // Keep training going
            } else {
                drawNetworkGraph();
            }
        });

        // Prevent right-click context menu inside canvas to allow clean right-click dot toggles
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const canvasX = e.clientX - rect.left;
            const canvasY = e.clientY - rect.top;
            const x = canvasX / canvas.width;
            const y = 1.0 - (canvasY / canvas.height);
            
            // Right click places opposite class
            const label = activeShape === 'square' ? 1 : -1;
            points.push({ x, y, label });
            datasetSelect.value = 'none';
            draw();
        });

        // Set active tool type
        function setActiveShape(type) {
            activeShape = type;
            if (type === 'square') {
                btnShapeSquare.classList.add('active');
                btnShapeTriangle.classList.remove('active');
            } else {
                btnShapeTriangle.classList.add('active');
                btnShapeSquare.classList.remove('active');
            }
        }

        btnShapeSquare.addEventListener('click', () => setActiveShape('square'));
        btnShapeTriangle.addEventListener('click', () => setActiveShape('triangle'));

        // Keyboard hotkey to toggle active shape tool (Spacebar)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                setActiveShape(activeShape === 'square' ? 'triangle' : 'square');
            }
        });

        // Learning rate change
        lrSlider.addEventListener('input', (e) => {
            lr = parseFloat(e.target.value);
            lrVal.innerText = lr.toFixed(2);
        });

        // Architecture change
        archSelect.addEventListener('change', initModel);

        // Preset dataset load
        datasetSelect.addEventListener('change', loadPresetDataset);

        // Train play / pause
        btnTrain.addEventListener('click', () => {
            if (isTraining) {
                isTraining = false;
                trainBtnText.innerText = 'Start Training';
                btnTrain.classList.remove('btn-danger');
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
            } else {
                if (points.length === 0) {
                    alert('Please add some points first (or choose a Dataset Preset).');
                    return;
                }
                isTraining = true;
                trainBtnText.innerText = 'Pause Training';
                btnTrain.classList.add('btn-danger');
                trainingLoop();
            }
        });

        // Single step
        btnStep.addEventListener('click', () => {
            isTraining = false;
            trainBtnText.innerText = 'Start Training';
            btnTrain.classList.remove('btn-danger');
            trainStep();
        });

        // Clear Points
        btnClear.addEventListener('click', () => {
            points = [];
            epoch = 0;
            epochCounter.innerText = '0';
            lossValue.innerText = '0.0000';
            datasetSelect.value = 'none';
            draw();
            drawNetworkGraph();
        });

        // Reset Weights
        btnResetWeights.addEventListener('click', initModel);

        // Initial launch
        initModel();
    </script>
</body>
</html>
